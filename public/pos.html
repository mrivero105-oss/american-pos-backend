<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punto de Venta - American POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
  </script>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <style>
    .product-grid::-webkit-scrollbar { width: 8px; }
    .product-grid::-webkit-scrollbar-track { background: #f1f1f1; }
    .product-grid::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    .dark body { background-color: #111827; }
    .dark .bg-white { background-color: #1f2937; }
    .dark .border-gray-300 { border-color: #4b5563; }
    .dark .border-b { border-color: #4b5563; }
    .dark .border-t { border-color: #4b5563; }
  </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">

  <header class="bg-gray-800 shadow-md sticky top-0 z-40">
    <div class="container mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between">
        <div class="flex-shrink-0">
          <h1 class="text-2xl font-bold text-white">American POS</h1>
        </div>
        <div class="flex items-center space-x-4">
            <nav class="flex space-x-4">
                <a href="index.html" class="text-gray-300 hover:bg-gray-700 hover:text-white rounded-md px-3 py-2 text-sm font-medium">Gestión</a>
                <a href="pos.html" class="bg-gray-900 text-white rounded-md px-3 py-2 text-sm font-medium" aria-current="page">TPV</a>
                <a href="dashboard.html" class="text-gray-300 hover:bg-gray-700 hover:text-white rounded-md px-3 py-2 text-sm font-medium">Dashboard</a>
                <a href="history.html" class="text-gray-300 hover:bg-gray-700 hover:text-white rounded-md px-3 py-2 text-sm font-medium">Historial</a>
            </nav>
            <button id="theme-toggle" type="button" class="text-gray-400 hover:text-white focus:outline-none">
                <svg id="theme-toggle-dark-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg id="theme-toggle-light-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 5.05A1 1 0 003.636 6.465l.707.707a1 1 0 001.414-1.414l-.707-.707zM3 11a1 1 0 100-2H2a1 1 0 100 2h1zM6.465 16.364a1 1 0 00-1.414 1.414l.707.707a1 1 0 001.414-1.414l-.707-.707z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
            </button>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow flex p-4 gap-4 overflow-hidden">
    <div class="w-3/5 flex flex-col">
      <div id="held-carts-container" class="mb-4" style="display: none;">
        <h3 class="text-xs font-semibold uppercase mb-2">Ventas en Espera</h3>
        <div id="held-carts-list" class="flex flex-wrap gap-2"></div>
      </div>

      <div class="flex gap-3 mb-4">
        <input type="text" id="product-search" placeholder="Buscar producto..." class="flex-grow p-2 border border-gray-300 rounded-md shadow-sm">
        <button id="custom-item-btn" class="px-4 py-2 bg-green-500 text-white font-semibold rounded-md hover:bg-green-600 transition-colors">Varios</button>
      </div>
      <div id="product-grid" class="product-grid flex-grow bg-white p-4 rounded-lg shadow-md overflow-y-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        <p id="grid-loading" class="col-span-full text-center">Cargando productos...</p>
      </div>
    </div>

    <div class="w-2/5 bg-white p-6 rounded-lg shadow-md flex flex-col">
      <h2 class="text-2xl font-semibold border-b pb-4 mb-4">Carrito</h2>
      <div id="cart-items" class="flex-grow overflow-y-auto">
        <p id="cart-empty-msg" class="">El carrito está vacío.</p>
      </div>
      <div class="border-t pt-4">
        <div class="text-right mb-4">
          <div class="flex justify-between items-center text-xl font-bold">
            <span>Total:</span>
            <span id="cart-total">$0.00</span>
          </div>
          <span id="cart-total-local" class="text-sm block">Bs. 0.00</span>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <button id="clear-cart-btn" class="col-span-1 bg-red-500 text-white py-3 rounded-lg font-semibold hover:bg-red-600 transition-colors text-sm">Vaciar</button>
            <button id="hold-cart-btn" class="col-span-1 bg-yellow-500 text-white py-3 rounded-lg font-semibold hover:bg-yellow-600 transition-colors text-sm">En Espera</button>
            <button id="checkout-btn" class="col-span-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors text-sm">Finalizar</button>
        </div>
      </div>
    </div>
  </main>

  <div id="custom-item-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
      <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-sm">
      <h2 class="text-xl font-semibold mb-4">Añadir Artículo Personalizado</h2>
      <form id="custom-item-form">
        <div class="mb-4">
          <label for="custom-item-name" class="block text-sm font-medium">Descripción</label>
          <input type="text" id="custom-item-name" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label for="custom-item-price-ves" class="block text-sm font-medium">Precio (VES)</label>
                <input type="number" id="custom-item-price-ves" step="any" min="0.01" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label for="custom-item-price-usd" class="block text-sm font-medium">Precio ($)</label>
                <input type="number" id="custom-item-price-usd" step="any" min="0.01" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
            </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button type="button" id="cancel-custom-item-btn" class="px-4 py-2 bg-gray-200 rounded-md hover:bg-gray-300 transition-colors">Cancelar</button>
          <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">Añadir al Carrito</button>
        </div>
      </form>
    </div>
  </div>
  
  <!-- Payment Modal -->
  <div id="payment-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Procesar Pago</h2>
      <div class="bg-gray-100 dark:bg-gray-700 p-4 rounded-lg mb-6">
        <div class="flex justify-between items-center">
          <span class="text-lg font-medium">Total a Pagar:</span>
          <div class="text-right">
            <p id="payment-total-usd" class="text-4xl font-bold text-blue-600">$0.00</p>
            <p id="payment-total-ves" class="text-base">Bs. 0.00</p>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label for="payment-received-ves" class="block text-sm font-medium">Monto Recibido (VES)</label>
          <input type="number" id="payment-received-ves" min="0" step="any" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-2xl">
        </div>
        <div>
          <label for="payment-received-usd" class="block text-sm font-medium">Monto Recibido (USD)</label>
          <input type="number" id="payment-received-usd" min="0" step="any" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-2xl">
        </div>
      </div>
      <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-800 p-4 rounded-lg mb-6">
        <div class="flex justify-between items-center">
          <span class="text-xl font-bold">Vuelto:</span>
          <span id="payment-change" class="text-3xl font-bold">Bs. 0.00</span>
        </div>
      </div>
      <div class="flex justify-end gap-4 mt-8">
        <button type="button" id="cancel-payment-btn" class="px-6 py-3 bg-gray-300 dark:bg-gray-600 rounded-md hover:bg-gray-400 transition-colors">Cancelar</button>
        <button type="button" id="confirm-payment-btn" class="px-6 py-3 bg-green-600 text-white font-bold rounded-md hover:bg-green-700 transition-colors">Confirmar Venta</button>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="theme.js"></script>
  <script src="pos.js"></script>
</body>
</html>
